{# templates/participants.html - Remplacer le bloc scripts_extra existant #}
{% block scripts_extra %}
<script>
    // Variable globale indiquant si l'utilisateur est connecté
    const isUserLoggedIn = {{ current_user.is_authenticated | tojson }};

    document.addEventListener('DOMContentLoaded', function() {
        if (window.dashboardConfig && window.dashboardConfig.debugMode) {
            console.log('Participants JS loaded (v_public_list)');
        }

        const searchInput = document.getElementById('searchParticipant');
        const participantsTableBody = document.getElementById('participants-table')?.querySelector('tbody');
        const viewParticipantModalElement = document.getElementById('viewParticipantModal');
        const viewParticipantModal = viewParticipantModalElement ? new bootstrap.Modal(viewParticipantModalElement) : null;
        const editParticipantModalElement = document.getElementById('editParticipantModal');
        const editParticipantModal = editParticipantModalElement ? new bootstrap.Modal(editParticipantModalElement) : null;
        const deleteParticipantModalElement = document.getElementById('deleteParticipantModal');
        const deleteParticipantModal = deleteParticipantModalElement ? new bootstrap.Modal(deleteParticipantModalElement) : null;

        // --- Filtre de recherche (inchangé) ---
        function filterParticipants() {
             if (!searchInput || !participantsTableBody) return;
            const searchValue = searchInput.value.toLowerCase().trim();
            const rows = participantsTableBody.querySelectorAll('tr.participant-row');
            rows.forEach(row => {
                const nameCell = row.querySelector('td:nth-child(1)');
                const serviceCell = row.querySelector('td:nth-child(2) span.badge');
                const emailCell = row.querySelector('td:nth-child(3) a');
                const nameText = nameCell ? nameCell.textContent.toLowerCase() : '';
                const serviceText = serviceCell ? serviceCell.textContent.toLowerCase() : '';
                const emailText = emailCell ? emailCell.textContent.toLowerCase() : '';
                const isVisible = nameText.includes(searchValue) || serviceText.includes(searchValue) || emailText.includes(searchValue);
                row.style.display = isVisible ? '' : 'none';
            });
        }
        if (searchInput) {
            searchInput.addEventListener('input', filterParticipants);
        }

        // --- Gestion Modale Unique "Voir Participant" (MODIFIÉE) ---
        const modalTitle = document.getElementById('viewParticipantModalLabel');
        const modalName = document.getElementById('modalParticipantName');
        const modalEmail = document.getElementById('modalParticipantEmail');
        const modalServiceBadge = document.getElementById('modalServiceBadge');
        const modalResponsableName = document.getElementById('modalResponsableName');
        const modalResponsableEmail = document.getElementById('modalResponsableEmail');
        const modalCountConfirmed = document.getElementById('modalCountConfirmed');
        const modalCountPending = document.getElementById('modalCountPending');
        const modalCountWaitlist = document.getElementById('modalCountWaitlist');
        const modalDetailsContent = document.getElementById('participantDetailsContent');
        const modalSpinner = document.getElementById('modalDetailsSpinner');
        const confirmedTbody = document.getElementById('modalConfirmedInscriptionsTableBody');
        const pendingTbody = document.getElementById('modalPendingInscriptionsTableBody');
        const waitlistTbody = document.getElementById('modalWaitlistTableBody');
        const noConfirmedMsg = document.getElementById('noConfirmedMsg');
        const noPendingMsg = document.getElementById('noPendingMsg');
        const noWaitlistMsg = document.getElementById('noWaitlistMsg');

        // Écouteur sur la table pour tous les boutons
        document.getElementById('participants-table')?.addEventListener('click', function(event) {
            const viewButton = event.target.closest('.btn-view-participant');
            const editButton = event.target.closest('.btn-edit-participant');
            const deleteButton = event.target.closest('.btn-delete-participant');

            // --- Logique pour le bouton "Voir" ---
            if (viewButton && viewParticipantModal) {
                // --- Récupération des données depuis data-* ---
                const participantId = viewButton.dataset.participantId;
                const prenom = viewButton.dataset.participantPrenom;
                const nom = viewButton.dataset.participantNom;
                const email = viewButton.dataset.participantEmail;
                const serviceNom = viewButton.dataset.serviceNom;
                const serviceCouleur = viewButton.dataset.serviceCouleur;
                const respNom = viewButton.dataset.responsableNom;
                const respEmail = viewButton.dataset.responsableEmail;
                const countConfirmed = viewButton.dataset.countConfirmed;
                const countPending = viewButton.dataset.countPending;
                const countWaitlist = viewButton.dataset.countWaitlist;

                // --- Mise à jour des infos statiques ---
                if(modalName) modalName.textContent = `${prenom} ${nom}`;
                if(modalEmail) modalEmail.textContent = email;
                if(modalServiceBadge) {
                    modalServiceBadge.textContent = serviceNom;
                    modalServiceBadge.style.backgroundColor = serviceCouleur;
                }
                if(modalResponsableName) modalResponsableName.textContent = respNom;
                if(modalResponsableEmail) {
                    modalResponsableEmail.textContent = respEmail;
                    modalResponsableEmail.href = `mailto:${respEmail}`;
                }
                if(modalCountConfirmed) modalCountConfirmed.textContent = countConfirmed;
                if(modalCountPending) modalCountPending.textContent = countPending;
                if(modalCountWaitlist) modalCountWaitlist.textContent = countWaitlist;

                // --- Vider le contenu précédent et préparer l'affichage ---
                if(confirmedTbody) confirmedTbody.innerHTML = '';
                if(pendingTbody) pendingTbody.innerHTML = '';
                if(waitlistTbody) waitlistTbody.innerHTML = '';
                if(noConfirmedMsg) noConfirmedMsg.style.display = 'none';
                if(noPendingMsg) noPendingMsg.style.display = 'none';
                if(noWaitlistMsg) noWaitlistMsg.style.display = 'none';
                if(modalDetailsContent) modalDetailsContent.classList.remove('is-loading'); // Assurer qu'il n'est pas en chargement

                // --- VÉRIFIER SI L'UTILISATEUR EST CONNECTÉ ---
                if (isUserLoggedIn) {
                    // Afficher le spinner et faire l'appel API
                    if(modalDetailsContent) modalDetailsContent.classList.add('is-loading');

                    fetch(`/api/participant/${participantId}/details`)
                        .then(response => {
                            // ... (gestion de la réponse fetch comme avant : vérifier ok, vérifier json) ...
                             if (!response.ok) {
                                if (response.status === 401 || response.status === 403) { throw new Error(`Accès non autorisé (${response.status}). Veuillez vous reconnecter.`); }
                                throw new Error(`Erreur serveur (${response.status}) lors de la récupération des détails.`);
                            }
                            const contentType = response.headers.get("content-type");
                            if (!contentType || !contentType.includes("application/json")) { throw new TypeError("Réponse inattendue du serveur (pas JSON). Session expirée?"); }
                            return response.json();
                        })
                        .then(data => {
                            if (data.error) { throw new Error(data.error); }
                            populateModalTable(confirmedTbody, data.confirmed, 'confirmed', noConfirmedMsg);
                            populateModalTable(pendingTbody, data.pending, 'pending', noPendingMsg);
                            populateModalTable(waitlistTbody, data.waitlist, 'waitlist', noWaitlistMsg);
                        })
                        .catch(error => {
                            // ... (gestion de l'erreur fetch comme avant) ...
                            console.error("Erreur lors du chargement des détails du participant:", error);
                            const errorHtml = `<tr><td colspan="5" class="text-center text-danger p-3"><i class="fas fa-exclamation-triangle me-2"></i> ${error.message || 'Erreur de chargement.'}</td></tr>`;
                            if(confirmedTbody) confirmedTbody.innerHTML = errorHtml;
                            if(pendingTbody) pendingTbody.innerHTML = errorHtml.replace('colspan="5"', 'colspan="4"');
                            if(waitlistTbody) waitlistTbody.innerHTML = errorHtml;
                            if(noConfirmedMsg) noConfirmedMsg.style.display = 'none';
                            if(noPendingMsg) noPendingMsg.style.display = 'none';
                            if(noWaitlistMsg) noWaitlistMsg.style.display = 'none';
                            if (typeof showToast === 'function') showToast(error.message || 'Impossible de charger les détails.', 'danger');
                        })
                        .finally(() => {
                            // Cacher le spinner
                            if(modalDetailsContent) modalDetailsContent.classList.remove('is-loading');
                        });
                } else {
                    // Utilisateur non connecté : Afficher message dans la modale
                    if(confirmedTbody) {
                         confirmedTbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted p-4"><i class="fas fa-lock me-2"></i>Veuillez vous <a href="/login?next=/participants">connecter</a> pour voir les détails des inscriptions.</td></tr>`;
                         confirmedTbody.closest('.table-responsive').style.display = 'block'; // Assurer que la table est visible
                    }
                     if(noConfirmedMsg) noConfirmedMsg.style.display = 'none'; // Cacher le message "no data"
                     // Cacher les autres sections
                     if(pendingTbody) pendingTbody.closest('.table-responsive').style.display = 'none';
                     if(waitlistTbody) waitlistTbody.closest('.table-responsive').style.display = 'none';
                     if(noPendingMsg) noPendingMsg.style.display = 'none';
                     if(noWaitlistMsg) noWaitlistMsg.style.display = 'none';
                }
                 // viewParticipantModal.show(); // Déjà géré par data-bs-toggle
            }

            // --- Logique pour le bouton "Modifier" ---
            else if (editButton && editParticipantModal) {
                const participantId = editButton.dataset.participantId;
                const nom = editButton.dataset.participantNom;
                const prenom = editButton.dataset.participantPrenom;
                const email = editButton.dataset.participantEmail;
                const serviceId = editButton.dataset.serviceId;

                const form = editParticipantModalElement.querySelector('#editParticipantForm');
                const title = editParticipantModalElement.querySelector('#editParticipantModalLabel');
                const nomInput = editParticipantModalElement.querySelector('#edit_nom');
                const prenomInput = editParticipantModalElement.querySelector('#edit_prenom');
                const emailInput = editParticipantModalElement.querySelector('#edit_email');
                const serviceSelect = editParticipantModalElement.querySelector('#edit_service_id');

                if(form) form.action = `/participant/update/${participantId}`;
                if(title) title.textContent = `Modifier - ${prenom} ${nom}`;
                if(nomInput) nomInput.value = nom;
                if(prenomInput) prenomInput.value = prenom;
                if(emailInput) emailInput.value = email;
                if(serviceSelect) serviceSelect.value = serviceId;

                // editParticipantModal.show(); // Déjà géré par data-bs-toggle
            }

            // --- Logique pour le bouton "Supprimer" ---
            else if (deleteButton && deleteParticipantModal) {
                const participantId = deleteButton.dataset.participantId;
                const nom = deleteButton.dataset.participantNom;
                const prenom = deleteButton.dataset.participantPrenom;

                const form = deleteParticipantModalElement.querySelector('#deleteParticipantForm');
                const title = deleteParticipantModalElement.querySelector('#deleteParticipantModalLabel');
                const bodyTextSpan = deleteParticipantModalElement.querySelector('#deleteParticipantText');

                if(form) form.action = `/participant/delete/${participantId}`;
                if(title) title.textContent = `Confirmer Suppression`;
                if(bodyTextSpan) bodyTextSpan.innerHTML = `Êtes-vous sûr de vouloir supprimer <strong>${prenom} ${nom}</strong> ? Ses inscriptions (confirmées ou non) et présences en liste d'attente seront également supprimées. Cette action est irréversible.`;

                // deleteParticipantModal.show(); // Déjà géré par data-bs-toggle
            }
        });

        // --- Fonction populateModalTable (inchangée) ---
        function populateModalTable(tbody, items, type, noDataElement) {
           // ... (code de la fonction populateModalTable reste identique) ...
             if (!tbody || !noDataElement) return;
            tbody.innerHTML = ''; // Vider d'abord

            if (!items || items.length === 0) {
                noDataElement.style.display = 'block';
                tbody.closest('.table-responsive').style.display = 'none'; // Cacher la table vide
                return;
            }

            noDataElement.style.display = 'none';
            tbody.closest('.table-responsive').style.display = 'block'; // Afficher la table

            items.forEach(item => {
                let rowHtml = '<tr>';
                if (type === 'confirmed') {
                    rowHtml += `<td><span class="theme-badge" data-theme="${item.theme}">${item.theme}</span></td>`;
                    rowHtml += `<td>${item.date}</td>`;
                    rowHtml += `<td>${item.horaire}</td>`;
                    rowHtml += `<td><span class="badge bg-light text-dark border">${item.salle}</span></td>`;
                    rowHtml += `<td class="text-center">
                                    <a href="/generer_invitation/${item.id}" class="btn btn-sm btn-outline-primary" target="_blank" title="Invitation Outlook"><i class="far fa-calendar-plus"></i></a>
                                    ${canAdminCancel() ? `
                                    <form action="/validation_inscription/${item.id}" method="post" class="d-inline ms-1">
                                        <input type="hidden" name="action" value="annuler">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Annuler" onclick="return confirm('Êtes-vous sûr de vouloir annuler cette inscription ?');"><i class="fas fa-ban"></i></button>
                                    </form>` : ''}
                               </td>`;
                } else if (type === 'pending') {
                    rowHtml += `<td><span class="theme-badge" data-theme="${item.theme}">${item.theme}</span></td>`;
                    rowHtml += `<td>${item.date}</td>`;
                    rowHtml += `<td><small>${item.date_inscription}</small></td>`;
                    rowHtml += `<td class="text-center">
                                    ${canAdminValidate() ? `
                                    <div class="btn-group btn-group-sm">
                                        <form action="/validation_inscription/${item.id}" method="post" class="d-inline">
                                            <input type="hidden" name="action" value="valider">
                                            <button type="submit" class="btn btn-outline-success" title="Valider"><i class="fas fa-check"></i></button>
                                        </form>
                                        <form action="/validation_inscription/${item.id}" method="post" class="d-inline ms-1">
                                            <input type="hidden" name="action" value="refuser">
                                            <button type="submit" class="btn btn-outline-danger" title="Refuser" onclick="return confirm('Êtes-vous sûr de vouloir refuser cette inscription ?');"><i class="fas fa-times"></i></button>
                                        </form>
                                    </div>` : '<span class="badge bg-secondary">Validation requise</span>'}
                               </td>`;
                } else if (type === 'waitlist') {
                    rowHtml += `<td><span class="theme-badge" data-theme="${item.theme}">${item.theme}</span></td>`;
                    rowHtml += `<td>${item.date}</td>`;
                    rowHtml += `<td class="text-center"><span class="badge bg-secondary">${item.position}</span></td>`;
                    rowHtml += `<td><small>${item.date_inscription}</small></td>`;
                    rowHtml += `<td>${item.notification_envoyee ? '<span class="badge bg-info">Notifié</span>' : '<span class="badge bg-light text-dark border">En attente</span>'}</td>`;
                }
                rowHtml += '</tr>';
                tbody.insertAdjacentHTML('beforeend', rowHtml);
            });
            // Améliorer les badges thème DANS la modale après ajout
            if (typeof window.enhanceThemeBadgesGlobally === 'function') {
                 window.enhanceThemeBadgesGlobally();
            }
        }

        // --- Fonctions canAdminValidate/canAdminCancel (inchangées) ---
        function canAdminValidate() {
             return {{ current_user.is_authenticated and (current_user.role == 'admin' or current_user.role == 'responsable') | tojson }};
        }
        function canAdminCancel() {
             return {{ current_user.is_authenticated and current_user.role == 'admin' | tojson }};
        }

        // --- Initialisation des badges (inchangée) ---
        if (typeof window.enhanceThemeBadgesGlobally === 'function') {
            window.enhanceThemeBadgesGlobally();
        }

    });
</script>
{% endblock %}
